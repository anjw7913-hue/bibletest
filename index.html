<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성구 암송 · 요한계시록</title>
<meta name="description" content="요한계시록 성구 10개 암송 훈련 프로그램 — 읽기, 연습, 완전 암송 3단계 학습">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #eeeae3;
    --border: #e0dcd4;
    --border-strong: #c4bfb4;
    --text: #18170f;
    --text-muted: #78756e;
    --text-light: #aeaaa2;
    --accent: #3a6648;
    --accent2: #56845f;
    --accent-light: #e4eeea;
    --accent-pale: #eff6f2;
    --gold: #a07612;
    --gold-light: #fdf5e0;
    --danger: #b22e2e;
    --danger-light: #fdf0f0;
    --success: #276e4a;
    --success-light: #ecf6f0;
    --warn: #b86820;
    --warn-light: #fdf2e4;
    --radius: 14px;
    --radius-sm: 9px;
    --shadow: 0 2px 14px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 36px rgba(0,0,0,0.11);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── Animations ─── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:none; }
  }
  @keyframes pop {
    0%  { transform:scale(0.94); opacity:0; }
    55% { transform:scale(1.02); }
    100%{ transform:scale(1);   opacity:1; }
  }
  @keyframes shake {
    0%,100%{ transform:translateX(0); }
    20%    { transform:translateX(-7px); }
    40%    { transform:translateX(7px); }
    60%    { transform:translateX(-4px); }
    80%    { transform:translateX(4px); }
  }
  @keyframes glow {
    0%  { box-shadow:0 0 0 0 rgba(58,102,72,.45); }
    70% { box-shadow:0 0 0 10px rgba(58,102,72,0); }
    100%{ box-shadow:0 0 0 0 rgba(58,102,72,0); }
  }
  @keyframes slideRight {
    from { opacity:0; transform:translateX(24px); }
    to   { opacity:1; transform:none; }
  }

  .hidden { display:none !important; }
  .screen { animation: fadeUp 0.32s ease; }

  /* ─── Header ─── */
  .header {
    width:100%; background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:20px 20px 18px;
    display:flex; align-items:center; gap:14px;
    position:sticky; top:0; z-index:100;
  }
  .hdr-back {
    width:36px; height:36px; border-radius:50%;
    background:var(--surface2); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:1rem; flex-shrink:0;
    transition:background .15s, transform .1s;
    user-select:none;
  }
  .hdr-back:hover { background:var(--border); transform:scale(1.08); }
  .hdr-center { flex:1; text-align:center; }
  .hdr-eyebrow {
    font-size:.62rem; font-weight:500; letter-spacing:.18em;
    color:var(--accent); text-transform:uppercase; margin-bottom:3px;
  }
  .hdr-title {
    font-family:'Noto Serif KR',serif;
    font-size:1.1rem; font-weight:600; color:var(--text);
  }
  .hdr-spacer { width:36px; flex-shrink:0; }

  .container { width:100%; max-width:660px; padding:28px 18px 88px; }

  /* ─── Section header ─── */
  .sec-eyebrow {
    font-size:.62rem; font-weight:500; letter-spacing:.16em;
    color:var(--text-light); text-transform:uppercase; margin-bottom:5px;
  }
  .sec-title {
    font-family:'Noto Serif KR',serif;
    font-size:1.22rem; font-weight:600; color:var(--text);
    margin-bottom:22px; line-height:1.55;
  }

  /* ─── Scripture Select Cards (multi-select) ─── */
  .sel-toolbar {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:12px;
  }
  .sel-count-pill {
    font-size:.72rem; font-weight:600;
    background:var(--accent-light); color:var(--accent);
    border-radius:20px; padding:4px 12px;
    border:1px solid rgba(58,102,72,.2);
    transition:all .2s;
  }
  .sel-count-pill.none { background:var(--surface2); color:var(--text-light); border-color:var(--border); }
  .sel-toolbar-btns { display:flex; gap:6px; }
  .btn-tiny {
    font-size:.7rem; font-weight:500; padding:5px 11px;
    border-radius:20px; cursor:pointer;
    border:1.5px solid var(--border); background:var(--surface);
    color:var(--text-muted); transition:all .15s;
  }
  .btn-tiny:hover { border-color:var(--accent); color:var(--accent); }

  .sc-list { display:flex; flex-direction:column; gap:9px; margin-bottom:6px; }
  .sc-card {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:var(--radius); padding:14px 16px;
    cursor:pointer; display:flex; align-items:center; gap:13px;
    transition:border-color .18s, box-shadow .18s, transform .12s;
    user-select:none;
  }
  .sc-card:hover { border-color:var(--accent2); box-shadow:var(--shadow); transform:translateY(-1px); }
  .sc-card.sel {
    border-color:var(--accent); background:var(--accent-pale);
    box-shadow:0 0 0 3px rgba(58,102,72,.12);
  }
  .sc-num-badge {
    width:36px; height:36px; border-radius:9px; flex-shrink:0;
    background:var(--surface2); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif KR',serif; font-size:.88rem; font-weight:700;
    color:var(--text-muted); transition:all .18s;
  }
  .sc-card.sel .sc-num-badge {
    background:var(--accent); border-color:var(--accent); color:#fff;
  }
  .sc-info { flex:1; min-width:0; }
  .sc-ref {
    font-family:'Noto Serif KR',serif;
    font-size:.9rem; font-weight:600; color:var(--text); margin-bottom:2px;
  }
  .sc-preview {
    font-size:.68rem; color:var(--text-light); line-height:1.5;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .sc-prog { text-align:right; flex-shrink:0; }
  .sc-score {
    font-family:'Noto Serif KR',serif;
    font-size:.98rem; font-weight:700; color:var(--accent);
  }
  .sc-score.none { font-size:.66rem; color:var(--text-light); font-family:'Noto Sans KR',sans-serif; font-weight:400; }
  .sc-tries { font-size:.6rem; color:var(--text-light); margin-top:1px; }
  .sc-check {
    width:22px; height:22px; border-radius:6px;
    border:2px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:.75rem; flex-shrink:0; transition:all .18s;
  }
  .sc-card.sel .sc-check {
    background:var(--accent); border-color:var(--accent); color:#fff; border-radius:6px;
  }

  /* ─── Mode Cards ─── */
  .mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px; }
  .mode-card {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:var(--radius); padding:20px 14px 16px;
    cursor:pointer; text-align:center;
    transition:border-color .2s, box-shadow .2s, transform .15s;
    position:relative; overflow:hidden;
  }
  .mode-card::before {
    content:''; position:absolute; inset:0; opacity:0;
    transition:opacity .2s;
  }
  .mode-card.learn::before  { background:linear-gradient(135deg,var(--accent-pale),transparent); }
  .mode-card.pract::before  { background:linear-gradient(135deg,var(--gold-light),transparent); }
  .mode-card.recite::before { background:linear-gradient(135deg,var(--danger-light),transparent); }
  .mode-card.wrong::before  { background:linear-gradient(135deg,var(--warn-light),transparent); }
  .mode-card:hover:not(.off)::before { opacity:1; }
  .mode-card:hover:not(.off) { border-color:var(--border-strong); box-shadow:var(--shadow); transform:translateY(-2px); }
  .mode-card.off { opacity:.42; cursor:not-allowed; }
  .mc-icon { font-size:1.9rem; margin-bottom:9px; position:relative; z-index:1; }
  .mc-name {
    font-family:'Noto Serif KR',serif;
    font-size:.93rem; font-weight:600; color:var(--text);
    margin-bottom:5px; position:relative; z-index:1;
  }
  .mc-desc { font-size:.7rem; color:var(--text-muted); line-height:1.65; position:relative; z-index:1; }
  .mc-badge {
    display:inline-block; margin-top:9px;
    font-size:.6rem; font-weight:600; letter-spacing:.08em;
    padding:3px 9px; border-radius:20px; position:relative; z-index:1;
  }
  .mc-badge.g  { background:var(--accent-light); color:var(--accent); }
  .mc-badge.au { background:var(--gold-light);   color:var(--gold); }
  .mc-badge.r  { background:var(--danger-light);  color:var(--danger); }
  .mc-badge.w  { background:var(--warn-light);    color:var(--warn); }

  /* ─── Buttons ─── */
  .btn-p {
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:15px;
    background:var(--accent); color:#fff;
    font-family:'Noto Sans KR',sans-serif;
    font-size:.88rem; font-weight:500; letter-spacing:.03em;
    border:none; border-radius:var(--radius-sm); cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn-p:hover  { background:#2b5038; }
  .btn-p:active { transform:scale(.98); }
  .btn-p:disabled { background:var(--border); color:var(--text-light); cursor:not-allowed; }

  .btn-s {
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:14px 18px; background:transparent;
    color:var(--text-muted); font-family:'Noto Sans KR',sans-serif;
    font-size:.84rem; border:1.5px solid var(--border);
    border-radius:var(--radius-sm); cursor:pointer;
    transition:border-color .15s, color .15s; white-space:nowrap;
  }
  .btn-s:hover { border-color:var(--border-strong); color:var(--text); }

  .btn-ghost {
    background:none; border:none; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; font-size:.8rem;
    color:var(--text-light); padding:8px 4px; transition:color .15s;
  }
  .btn-ghost:hover { color:var(--text-muted); }

  /* ─── Flash progress bar ─── */
  .fc-prog-row {
    display:flex; align-items:center; gap:10px; margin-bottom:18px;
  }
  .fc-counter { font-size:.76rem; color:var(--text-muted); white-space:nowrap; font-weight:500; }
  .fc-bar-wrap { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .fc-bar-fill { height:100%; background:var(--accent); border-radius:3px; transition:width .4s ease; }
  .streak-pill {
    display:flex; align-items:center; gap:4px;
    font-size:.7rem; font-weight:700; color:var(--gold);
    background:var(--gold-light); border-radius:20px; padding:4px 10px;
    white-space:nowrap; border:1px solid rgba(160,118,18,.18);
  }

  /* ─── Flash Card ─── */
  .flashcard {
    background:var(--surface); border:1px solid var(--border);
    border-radius:18px; padding:26px 22px 22px;
    box-shadow:var(--shadow-lg); animation:pop .28s ease;
    margin-bottom:14px;
  }
  .fc-mode-tag {
    display:inline-flex; align-items:center; gap:5px;
    font-size:.62rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    padding:4px 11px; border-radius:20px; margin-bottom:13px;
  }
  .fc-mode-tag.learn   { background:var(--accent-light); color:var(--accent); }
  .fc-mode-tag.pract   { background:var(--gold-light);   color:var(--gold); }
  .fc-mode-tag.recite  { background:var(--danger-light);  color:var(--danger); }
  .fc-mode-tag.wrong   { background:var(--warn-light);    color:var(--warn); }

  .fc-ref {
    font-family:'Noto Serif KR',serif;
    font-size:1.02rem; font-weight:600; color:var(--text); margin-bottom:16px;
  }

  /* Learn: full text */
  .fc-text {
    font-family:'Noto Serif KR',serif;
    font-size:.98rem; color:var(--text); line-height:2.3; word-break:keep-all;
  }
  .fc-text .kw {
    background:linear-gradient(to bottom,transparent 58%,rgba(58,102,72,.22) 58%);
    font-weight:600; color:var(--accent);
  }

  /* Self-check */
  .self-check { display:flex; gap:10px; margin-top:14px; }
  .btn-chk {
    flex:1; padding:14px; border-radius:var(--radius-sm);
    font-family:'Noto Serif KR',serif; font-size:.88rem; font-weight:600;
    border:2px solid; cursor:pointer;
    transition:all .15s; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-chk.ok  { border-color:var(--success); color:var(--success); background:var(--success-light); }
  .btn-chk.ok:hover  { background:var(--success); color:#fff; }
  .btn-chk.bad { border-color:var(--danger);  color:var(--danger);  background:var(--danger-light); }
  .btn-chk.bad:hover { background:var(--danger); color:#fff; }

  /* Practice: blanks */
  .fc-ptext {
    font-family:'Noto Serif KR',serif;
    font-size:.96rem; line-height:2.5; word-break:keep-all; color:var(--text);
  }
  .hint-ch {
    display:inline-block; font-size:.64rem; font-weight:700;
    color:var(--accent); vertical-align:baseline; margin-right:1px;
    background:var(--accent-light); border-radius:3px; padding:0 2px;
  }
  .blank-inp {
    display:inline-block; background:var(--surface2);
    border:none; border-bottom:2px solid var(--border-strong);
    color:var(--text); font-family:'Noto Serif KR',serif; font-size:.94rem;
    padding:2px 6px; outline:none; min-width:60px;
    text-align:center; vertical-align:baseline;
    border-radius:3px 3px 0 0;
    transition:border-color .15s, background .15s;
  }
  .blank-inp:focus { border-bottom-color:var(--accent); background:var(--accent-pale); }
  .blank-inp.ok  { border-bottom-color:var(--success); color:var(--success); background:var(--success-light); }
  .blank-inp.no  { border-bottom-color:var(--danger);  color:var(--danger);  background:var(--danger-light); animation:shake .32s ease; }

  /* Recite textarea */
  .recite-ta {
    width:100%; background:var(--surface2);
    border:1.5px solid var(--border); border-radius:9px;
    color:var(--text); font-family:'Noto Serif KR',serif;
    font-size:.95rem; line-height:2.1; padding:12px 14px;
    resize:none; outline:none; min-height:100px;
    transition:border-color .15s, background .15s;
  }
  .recite-ta:focus { border-color:var(--accent); background:var(--accent-pale); }
  .recite-ta.ok  { border-color:var(--success); background:var(--success-light); }
  .recite-ta.no  { border-color:var(--danger);  background:var(--danger-light); }
  .ta-hint { font-size:.7rem; color:var(--text-light); margin-top:5px; }

  .fc-fb {
    margin-top:13px; padding:12px 14px; border-radius:9px;
    font-size:.82rem; line-height:1.75; animation:fadeUp .22s ease;
  }
  .fc-fb.ok  { background:var(--success-light); color:var(--success); border:1px solid rgba(39,110,74,.2); }
  .fc-fb.no  { background:var(--danger-light);  color:var(--danger);  border:1px solid rgba(178,46,46,.2); }
  .fc-fb .fb-ans {
    display:block; margin-top:7px; color:var(--text);
    font-family:'Noto Serif KR',serif; font-size:.87rem; line-height:1.85;
  }

  /* Diff view */
  .diff-block {
    margin-top:11px; border-top:1px solid rgba(178,46,46,.18); padding-top:11px;
    display:flex; flex-direction:column; gap:10px;
  }
  .diff-section-label {
    font-size:.6rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    margin-bottom:4px; opacity:.7;
  }
  .diff-line {
    font-family:'Noto Serif KR',serif; font-size:.88rem;
    line-height:2.1; word-break:keep-all; color:var(--text);
  }
  .dw-ok   { color:var(--text); }
  .dw-miss {
    background:rgba(184,104,32,.18); color:var(--warn);
    border-radius:3px; padding:1px 4px; font-weight:700;
  }
  .dw-miss::before { content:'['; opacity:.5; font-weight:400; }
  .dw-miss::after  { content:']'; opacity:.5; font-weight:400; }
  .dw-extra {
    background:rgba(178,46,46,.14); color:var(--danger);
    text-decoration:line-through; border-radius:3px; padding:1px 4px;
  }

  /* Card bottom actions */
  .fc-acts { display:flex; gap:10px; }
  .fc-acts .btn-p { flex:1; }

  /* ─── Results ─── */
  .result-hero {
    background:var(--surface); border:1px solid var(--border);
    border-radius:18px; padding:32px 22px 26px; text-align:center;
    box-shadow:var(--shadow-lg); animation:pop .36s ease; margin-bottom:18px;
  }
  .score-ring {
    width:108px; height:108px; border-radius:50%;
    background:conic-gradient(var(--accent) 0% var(--pct), var(--border) var(--pct));
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 18px; animation:glow 2s infinite;
    box-shadow:inset 0 0 0 13px var(--surface);
  }
  .score-num {
    font-family:'Noto Serif KR',serif;
    font-size:1.5rem; font-weight:700; color:var(--text);
  }
  .result-msg {
    font-family:'Noto Serif KR',serif;
    font-size:1.18rem; font-weight:600; margin-bottom:6px;
  }
  .result-sub { font-size:.8rem; color:var(--text-muted); margin-bottom:8px; }

  /* Wrong list */
  .wrong-section { margin-bottom:18px; }
  .wrong-sec-title {
    font-size:.66rem; font-weight:600; letter-spacing:.14em;
    color:var(--text-light); text-transform:uppercase; margin-bottom:10px;
  }
  .wrong-item {
    background:var(--danger-light); border:1px solid rgba(178,46,46,.14);
    border-radius:9px; padding:12px 14px; margin-bottom:8px;
    animation:slideRight .25s ease;
  }
  .wi-ref { font-size:.7rem; font-weight:700; color:var(--danger); margin-bottom:5px; }
  .wi-text { font-family:'Noto Serif KR',serif; font-size:.84rem; color:var(--text); line-height:1.85; }

  .res-acts { display:flex; flex-direction:column; gap:10px; }

  /* ─── Divider ─── */
  hr { border:none; border-top:1px solid var(--border); margin:18px 0; }

  /* ─── Responsive ─── */
  @media(max-width:600px){
    .mode-grid { grid-template-columns:1fr; }
    .container { padding:18px 14px 72px; }
    .flashcard { padding:18px 14px 16px; }
    .result-hero { padding:24px 14px 20px; }
    .fc-text, .fc-ptext { font-size:.91rem; }
  }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header" id="hdr">
  <div class="hdr-back hidden" id="hdr-back" onclick="goBack()">←</div>
  <div class="hdr-center">
    <div class="hdr-eyebrow">요한계시록</div>
    <div class="hdr-title" id="hdr-title">성구 암송</div>
  </div>
  <div class="hdr-spacer"></div>
</div>

<div class="container">

<!-- ═══ HOME ═══ -->
<div id="s-home" class="screen">
  <div class="sec-eyebrow">Step 1</div>
  <div class="sec-title">암송할 성구를 선택하세요</div>
  <div class="sel-toolbar">
    <div class="sel-count-pill none" id="sel-count">선택 없음</div>
    <div class="sel-toolbar-btns">
      <button class="btn-tiny" onclick="selAll()">전체 선택</button>
      <button class="btn-tiny" onclick="selNone()">선택 해제</button>
    </div>
  </div>
  <div class="sc-list" id="sc-list"></div>
  <button class="btn-p" id="btn-sel" disabled style="margin-top:16px" onclick="showMode()">모드 선택 →</button>
</div>

<!-- ═══ MODE ═══ -->
<div id="s-mode" class="screen hidden">
  <div class="sec-eyebrow">Step 2</div>
  <div class="sec-title">학습 모드를 선택하세요</div>
  <div class="mode-grid">
    <div class="mode-card learn" id="mc-learn" onclick="go('learn')">
      <div class="mc-icon">📖</div>
      <div class="mc-name">읽기</div>
      <div class="mc-desc">성구를 한 절씩<br>집중해서 읽어요</div>
      <div class="mc-badge g">Stage 1</div>
    </div>
    <div class="mode-card pract" id="mc-pract" onclick="go('practice')">
      <div class="mc-icon">✏️</div>
      <div class="mc-name">연습</div>
      <div class="mc-desc">첫 글자 힌트와 함께<br>빈칸을 채워요</div>
      <div class="mc-badge au">Stage 2</div>
    </div>
    <div class="mode-card recite" id="mc-recite" onclick="go('recite')">
      <div class="mc-icon">🎯</div>
      <div class="mc-name">완전 암송</div>
      <div class="mc-desc">절 번호만 보고<br>전체를 입력해요</div>
      <div class="mc-badge r">Stage 3</div>
    </div>

<script>

    { v:'계 14장 2절', t:'내가 하늘에서 나는 소리를 들으니 많은 물 소리도 같고 큰 뇌성도 같은데 내가 들은 소리는 거문고 타는 자들의 그 거문고 타는 것 같더라' },

  ]},
  { num:8, ref:'계 20장 4~6절', verses:[

    { v:'계 20장 5절', t:'(그 나머지 죽은 자들은 그 천 년이 차기까지 살지 못하더라) 이는 첫째 부활이라' },
    { v:'계 20장 6절', t:'이 첫째 부활에 참예하는 자들은 복이 있고 거룩하도다 둘째 사망이 그들을 다스리는 권세가 없고 도리어 그들이 하나님과 그리스도의 제사장이 되어 천 년 동안 그리스도로 더불어 왕 노릇 하리라' }

  { num:9, ref:'계 21장 1~2절', verses:[
    { v:'계 21장 1절', t:'또 내가 새 하늘과 새 땅을 보니 처음 하늘과 처음 땅이 없어졌고 바다도 다시 있지 않더라' },
    { v:'계 21장 2절', t:'또 내가 보매 거룩한 성 새 예루살렘이 하나님께로부터 하늘에서 내려오니 그 예비한 것이 신부가 남편을 위하여 단장한 것 같더라' }
  ]},
  { num:10, ref:'계 22장 18~19절', verses:[

    { v:'계 22장 19절', t:'만일 누구든지 이 책의 예언의 말씀에서 제하여 버리면 하나님이 이 책에 기록된 생명나무와 및 거룩한 성에 참예함을 제하여 버리시리라' }
  ]}
];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let selSet = new Set();   // selected SCRIPTURES indices (0-based)
let mode = '';
let verses = [];          // [{scRef, v, t}]
let cur = 0;
let streak = 0;
let wrongRefs = [];
let graded = false;

/* ═══════════════════════════════════════════
   STORAGE  (per-scripture + global wrong pool)
═══════════════════════════════════════════ */
const skSc  = num => `sgam-sc-${num}`;   // per-scripture stats
const SK_WR = 'sgam-wr';                 // global wrong-verse pool

function loadSc(num) {
  try { return JSON.parse(localStorage.getItem(skSc(num))) || { n:0, best:null }; }
  catch { return { n:0, best:null }; }
}
function saveSc(num, d) {
  try { localStorage.setItem(skSc(num), JSON.stringify(d)); } catch {}
}
function loadWr() {
  try { return JSON.parse(localStorage.getItem(SK_WR)) || []; } catch { return []; }
}
function saveWr(arr) {
  try { localStorage.setItem(SK_WR, JSON.stringify(arr)); } catch {}
}

/* ═══════════════════════════════════════════
   INIT / SCREENS
═══════════════════════════════════════════ */
function screens(id) {
  ['s-home','s-mode','s-flash','s-result'].forEach(s =>
    document.getElementById(s).classList.toggle('hidden', s !== id));
}
function setHdr(title, back) {
  document.getElementById('hdr-title').textContent = title;
  document.getElementById('hdr-back').classList.toggle('hidden', !back);
}

function showHome() {
  selSet = new Set();
  renderScList();
  updateSelUI();
  screens('s-home');
  setHdr('성구 암송', false);
}
function goBack() {
  if (!document.getElementById('s-flash').classList.contains('hidden')) {
    if (confirm('학습을 중단하고 모드 선택으로 돌아갈까요?')) showMode();
  } else if (!document.getElementById('s-mode').classList.contains('hidden')) {
    showHome();
  } else {
    showMode();
  }
}
function showMode() {
  if (selSet.size === 0) return;
  // Wrong mode: check if any saved wrong verses belong to selected scriptures
  const allVerses = buildVerses(false);
  const savedWr = loadWr();
  const filteredWr = savedWr.filter(ref => allVerses.some(v => v.v === ref));
  const hasWrong = filteredWr.length > 0;
  const wc = document.getElementById('mc-wrong');
  wc.classList.toggle('off', !hasWrong);
  document.getElementById('wrong-badge').textContent = hasWrong ? `${filteredWr.length}개` : '없음';
  // Build header label
  const refs = [...selSet].map(i => `${SCRIPTURES[i].num}번`).join('·');
  screens('s-mode');
  setHdr(`성구 ${refs}`, true);
}

/* ═══════════════════════════════════════════
   SCRIPTURE LIST (multi-select)
═══════════════════════════════════════════ */
function renderScList() {
  const el = document.getElementById('sc-list');
  el.innerHTML = SCRIPTURES.map((sc, i) => {
    const p = loadSc(sc.num);
    const scoreHtml = p.best !== null
      ? `<div class="sc-score">${p.best}점</div><div class="sc-tries">${p.n}회</div>`
      : `<div class="sc-score none">미완료</div>`;
    const preview = sc.verses[0].t.slice(0, 26) + (sc.verses[0].t.length > 26 ? '…' : '');
    return `<div class="sc-card" id="sc-card-${i}" onclick="toggleSc(${i})">
      <div class="sc-num-badge" id="sc-badge-${i}">${sc.num}</div>
      <div class="sc-info">
        <div class="sc-ref">${esc(sc.ref)}</div>
        <div class="sc-preview">${esc(preview)}</div>
      </div>
      <div class="sc-prog">${scoreHtml}</div>
      <div class="sc-check" id="sc-chk-${i}"></div>
    </div>`;
  }).join('');
}

function toggleSc(i) {
  if (selSet.has(i)) selSet.delete(i);
  else selSet.add(i);
  const card  = document.getElementById(`sc-card-${i}`);
  const badge = document.getElementById(`sc-badge-${i}`);
  const chk   = document.getElementById(`sc-chk-${i}`);
  const on = selSet.has(i);
  card.classList.toggle('sel', on);
  chk.textContent  = on ? '✓' : '';
  updateSelUI();
}
function selAll()  { SCRIPTURES.forEach((_, i) => selSet.add(i));    refreshAllCards(); }
function selNone() { selSet.clear();                                   refreshAllCards(); }
function refreshAllCards() {
  SCRIPTURES.forEach((_, i) => {
    const on = selSet.has(i);
    document.getElementById(`sc-card-${i}`).classList.toggle('sel', on);
    document.getElementById(`sc-chk-${i}`).textContent = on ? '✓' : '';
  });
  updateSelUI();
}
function updateSelUI() {
  const cnt = selSet.size;
  const pill = document.getElementById('sel-count');
  if (cnt === 0) {
    pill.textContent = '선택 없음'; pill.classList.add('none');
  } else {
    const totalVerses = [...selSet].reduce((s, i) => s + SCRIPTURES[i].verses.length, 0);
    pill.textContent = `${cnt}개 성구 · ${totalVerses}절 선택됨`;
    pill.classList.remove('none');
  }
  document.getElementById('btn-sel').disabled = cnt === 0;
}

/* ═══════════════════════════════════════════
   START
═══════════════════════════════════════════ */
function buildVerses(wrongOnly) {
  const all = [];
  // Sort selected indices to maintain scripture order
  [...selSet].sort((a, b) => a - b).forEach(i => {
    const sc = SCRIPTURES[i];
    sc.verses.forEach(vs => all.push({ scNum: sc.num, scRef: sc.ref, v: vs.v, t: vs.t }));
  });
  if (wrongOnly) {
    const savedWr = loadWr();
    return all.filter(a => savedWr.includes(a.v));
  }
  return all;
}

function go(m) {
  const mcId = m === 'practice' ? 'mc-pract' : `mc-${m}`;
  if (document.getElementById(mcId).classList.contains('off')) return;
  mode = m;
  wrongRefs = [];
  streak = 0;
  cur = 0;
  graded = false;
  verses = buildVerses(m === 'wrong');
  if (!verses.length) return;
  const lbl = { learn:'읽기', practice:'연습', recite:'완전 암송', wrong:'오답 복습' };
  const refs = [...selSet].sort((a,b)=>a-b).map(i => `${SCRIPTURES[i].num}번`).join('·');
  setHdr(`성구 ${refs} — ${lbl[m]}`, true);
  screens('s-flash');
  renderCard();
}

function retry() { go(mode); }

/* ═══════════════════════════════════════════
   CARD RENDERING
═══════════════════════════════════════════ */
function renderCard() {
  graded = false;
  const total = verses.length;
  document.getElementById('fc-counter').textContent = `${cur + 1} / ${total}`;
  document.getElementById('fc-bar').style.width = `${Math.round(cur / total * 100)}%`;
  document.getElementById('streak-pill').textContent = `🔥 ${streak}`;

  const card = document.getElementById('card');
  const acts = document.getElementById('card-acts');
  const vrs = verses[cur];

  if (mode === 'learn')    renderLearn(card, acts, vrs);
  else if (mode === 'practice') renderPractice(card, acts, vrs);
  else renderRecite(card, acts, vrs);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ─── LEARN ─── */
function renderLearn(card, acts, vrs) {
  const words = vrs.t.split(/\s+/);
  const html = words.map((w, i) => {
    const bare = w.replace(/[,.!?:]/g, '');
    const isKey = bare.length >= 3 && (bare.length >= 4 || i % 3 === 1);
    return isKey ? `<span class="kw">${esc(w)}</span>` : esc(w);
  }).join(' ');

  card.innerHTML = `
    <div class="fc-mode-tag learn">📖 읽기 — 천천히 읽어보세요</div>
    <div class="fc-ref">${esc(vrs.v)}</div>
    <div class="fc-text">${html}</div>
  `;
  acts.innerHTML = `
    <div class="self-check" style="width:100%">
      <button class="btn-chk bad" onclick="learnSelf(false)">🙁 몰랐어요</button>
      <button class="btn-chk ok"  onclick="learnSelf(true)">😊 알았어요</button>
    </div>`;
}
function learnSelf(knew) {
  if (!knew) { wrongRefs.push(verses[cur].v); streak = 0; }
  else streak++;
  next();
}

/* ─── PRACTICE ─── */
function renderPractice(card, acts, vrs) {
  const words = vrs.t.split(/\s+/);
  const bs = pickBlanks(words.length, 0.38);
  let inner = '';
  words.forEach((w, i) => {
    if (i > 0) inner += ' ';
    if (bs.has(i)) {
      const hint = w.charAt(0);
      const id = `bi${i}`;
      inner += `<span class="hint-ch">${esc(hint)}</span><input id="${id}" type="text" class="blank-inp" data-ans="${esc(w)}" style="width:${Math.max(56, w.length * 17)}px" autocomplete="off" spellcheck="false">`;
    } else {
      inner += esc(w);
    }
  });

  card.innerHTML = `
    <div class="fc-mode-tag pract">✏️ 연습 — 첫 글자를 참고해 채워보세요</div>
    <div class="fc-ref">${esc(vrs.v)}</div>
    <div class="fc-ptext">${inner}</div>
  `;
  acts.innerHTML = `
    <button class="btn-s" onclick="skipCard()">건너뛰기</button>
    <button class="btn-p" onclick="gradePract()">확인 →</button>`;

  card.querySelectorAll('.blank-inp').forEach(inp =>
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') gradePract(); }));
  const first = card.querySelector('.blank-inp');
  if (first) setTimeout(() => first.focus(), 80);
}

function pickBlanks(len, r) {
  const cnt = Math.max(1, Math.round(len * r));
  const arr = Array.from({ length: len }, (_, i) => i);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return new Set(arr.slice(0, cnt));
}

function gradePract() {
  if (graded) { next(); return; }
  graded = true;
  const card = document.getElementById('card');
  const inps = card.querySelectorAll('.blank-inp');
  let allOk = true;
  inps.forEach(inp => {
    const ok = norm(inp.value) === norm(inp.getAttribute('data-ans'));
    inp.readOnly = true;
    inp.classList.toggle('ok', ok);
    inp.classList.toggle('no', !ok);
    if (!ok) { allOk = false; inp.value = inp.getAttribute('data-ans'); }
  });
  const fb = document.createElement('div');
  fb.className = 'fc-fb ' + (allOk ? 'ok' : 'no');
  fb.textContent = allOk ? '✓ 완벽해요! 다음으로 넘어가세요.' : '✗ 틀린 부분을 확인하세요. 정답을 눈에 새겨보세요.';
  card.appendChild(fb);
  if (allOk) streak++;
  else { streak = 0; wrongRefs.push(verses[cur].v); }
  document.getElementById('card-acts').innerHTML =
    `<button class="btn-p" onclick="next()">다음 →</button>`;
}

/* ─── RECITE / WRONG ─── */
function renderRecite(card, acts, vrs) {
  const tag = mode === 'wrong'
    ? '<div class="fc-mode-tag wrong">🔁 오답 복습 — 처음부터 전부 입력해보세요</div>'
    : '<div class="fc-mode-tag recite">🎯 완전 암송 — 아무 힌트 없이 도전!</div>';
  card.innerHTML = `
    ${tag}
    <div class="fc-ref">${esc(vrs.v)}</div>
    <textarea id="recite-ta" class="recite-ta" rows="4" autocomplete="off" spellcheck="false" placeholder="이 절을 전부 입력하세요…"></textarea>
    <div class="ta-hint">Ctrl+Enter 로 확인</div>
  `;
  acts.innerHTML = `
    <button class="btn-s" onclick="skipCard()">건너뛰기</button>
    <button class="btn-p" onclick="gradeRecite()">확인 →</button>`;
  const ta = document.getElementById('recite-ta');
  ta.addEventListener('keydown', e => { if (e.key === 'Enter' && e.ctrlKey) gradeRecite(); });
  setTimeout(() => ta.focus(), 80);
}

/* LCS-based word diff
   ops: [{type:'ok'|'miss'|'extra', word, inp}] */
function buildDiff(inputStr, ansStr) {
  const iw = inputStr.trim().split(/\s+/).filter(w => w);
  const aw = ansStr.trim().split(/\s+/).filter(w => w);
  const m = iw.length, n = aw.length;

  // DP table
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = normNoSpace(iw[i-1]) === normNoSpace(aw[j-1])
        ? dp[i-1][j-1] + 1
        : Math.max(dp[i-1][j], dp[i][j-1]);

  // Backtrack
  const ops = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && normNoSpace(iw[i-1]) === normNoSpace(aw[j-1])) {
      ops.unshift({ type:'ok',    word: aw[j-1], inp: iw[i-1] }); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      ops.unshift({ type:'miss',  word: aw[j-1] }); j--;          // 빠진 단어
    } else {
      ops.unshift({ type:'extra', inp:  iw[i-1] }); i--;          // 잘못 입력한 단어
    }
  }
  return ops;
}

function gradeRecite() {
  if (graded) { next(); return; }
  graded = true;
  const ta = document.getElementById('recite-ta');
  const ans = verses[cur].t;
  const exactOk   = norm(ta.value) === norm(ans);
  const contentOk = normNoSpace(ta.value) === normNoSpace(ans);
  const ok = contentOk;

  ta.readOnly = true;
  ta.classList.toggle('ok', ok);
  ta.classList.toggle('no', !ok);

  const fb = document.createElement('div');
  fb.className = 'fc-fb ' + (ok ? 'ok' : 'no');

  if (exactOk) {
    fb.innerHTML = '✓ 완벽합니다!';
  } else if (contentOk) {
    fb.innerHTML = '✓ 정답입니다 <span style="font-size:.78rem;font-weight:400;opacity:.75">(띄어쓰기 차이 있음)</span>';
  } else {
    // 오답: diff 표시
    const ops = buildDiff(ta.value, ans);

    // 내 입력 줄 (extra=취소선빨강, miss=___회색, ok=정상)
    const myLine = ops.map(op => {
      if (op.type === 'ok')    return `<span class="dw-ok">${esc(op.inp)}</span>`;
      if (op.type === 'extra') return `<span class="dw-extra">${esc(op.inp)}</span>`;
      if (op.type === 'miss')  return `<span style="color:var(--border-strong)">___</span>`;
    }).join(' ');

    // 정답 줄 (miss=주황강조, ok=정상, extra는 정답에 없음)
    const ansLine = ops.filter(op => op.type !== 'extra').map(op => {
      if (op.type === 'ok')   return `<span class="dw-ok">${esc(op.word)}</span>`;
      if (op.type === 'miss') return `<span class="dw-miss">${esc(op.word)}</span>`;
    }).join(' ');

    fb.innerHTML = `✗ 틀렸습니다
      <div class="diff-block">
        <div>
          <div class="diff-section-label">내 입력</div>
          <div class="diff-line">${myLine}</div>
        </div>
        <div>
          <div class="diff-section-label">정답</div>
          <div class="diff-line">${ansLine}</div>
        </div>
      </div>`;
  }

  document.getElementById('card').appendChild(fb);
  if (ok) streak++;
  else { streak = 0; wrongRefs.push(verses[cur].v); }
  document.getElementById('card-acts').innerHTML =
    `<button class="btn-p" onclick="next()">다음 →</button>`;
}

function skipCard() {
  wrongRefs.push(verses[cur].v);
  streak = 0;
  next();
}
function next() {
  cur++;
  if (cur >= verses.length) showResult();
  else renderCard();
}

/* ═══════════════════════════════════════════
   RESULT
═══════════════════════════════════════════ */
function showResult() {
  const total = verses.length;
  const uniqWrong = [...new Set(wrongRefs)];
  const correct = total - uniqWrong.length;
  const score = total ? Math.round(correct / total * 100) : 100;

  // Save per-scripture stats & update global wrong pool
  if (mode !== 'learn') {
    // Update stats for each selected scripture
    [...selSet].forEach(i => {
      const sc = SCRIPTURES[i];
      const scVerses = verses.filter(v => v.scNum === sc.num);
      if (scVerses.length === 0) return;
      const scWrong = scVerses.filter(v => uniqWrong.includes(v.v)).length;
      const scCorrect = scVerses.length - scWrong;
      const scScore = Math.round(scCorrect / scVerses.length * 100);
      const p = loadSc(sc.num);
      p.n = (p.n || 0) + 1;
      if (p.best === null || scScore > p.best) p.best = scScore;
      saveSc(sc.num, p);
    });
    // Update global wrong pool: replace refs belonging to this session's scriptures
    const sessionRefs = verses.map(v => v.v);
    const prevWr = loadWr().filter(r => !sessionRefs.includes(r)); // keep other scriptures' wrongs
    saveWr([...prevWr, ...uniqWrong]);
  }

  // Score ring
  const ring = document.getElementById('score-ring');
  ring.style.setProperty('--pct', score + '%');
  document.getElementById('score-num').textContent = score + '점';

  const msgs = [[100,'🏆 완벽 암송!'],[90,'🎉 훌륭해요!'],[75,'👍 잘 하고 있어요!'],[50,'💪 조금만 더!'],[0,'🌱 계속 연습해요']];
  document.getElementById('result-msg').textContent = msgs.find(m => score >= m[0])[1];
  document.getElementById('result-sub').textContent = mode === 'learn'
    ? `${total}절 중 ${correct}절을 알고 있어요 · 스트릭 ${streak}`
    : `${total}절 중 ${correct}절 정답 · 스트릭 ${streak}`;

  // Wrong list
  const ws = document.getElementById('wrong-sec');
  const wi = document.getElementById('wrong-items');
  if (uniqWrong.length > 0) {
    ws.classList.remove('hidden');
    wi.innerHTML = uniqWrong.map(ref => {
      const vr = verses.find(v => v.v === ref);
      return vr ? `<div class="wrong-item"><div class="wi-ref">${esc(vr.v)}</div><div class="wi-text">${esc(vr.t)}</div></div>` : '';
    }).join('');
  } else {
    ws.classList.add('hidden');
  }

  // Wrong retry button
  const wrBtn = document.getElementById('btn-wrong-retry');
  wrBtn.style.display = (uniqWrong.length > 0 && mode !== 'wrong') ? 'flex' : 'none';

  screens('s-result');
  setHdr('결과', true);
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function norm(s) { return s.trim().replace(/\s+/g, ' '); }
function normNoSpace(s) { return s.replace(/\s+/g, ''); }  // 띄어쓰기 무시
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── BOOT ─── */
showHome();
</script>
